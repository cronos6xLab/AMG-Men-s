<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMG Menús · Delivery Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --text-2xl:  clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
            --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
            --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
            --space-12:3rem;--space-16:4rem;
            --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.875rem;
            --radius-xl:1.25rem;--radius-full:9999px;
            --font-display:'Instrument Serif',Georgia,serif;
            --font-body:'DM Sans','Helvetica Neue',sans-serif;
            --transition:200ms cubic-bezier(0.16,1,0.3,1);
        }
        :root,[data-theme="dark"]{
            --bg:#0e0d0c;--surface:#151413;--surface-2:#1a1917;--surface-3:#1f1e1c;
            --border:oklch(0.85 0 0/.08);--border-hover:oklch(0.85 0 0/.18);
            --text:#e8e5e0;--text-muted:#7a7874;--text-faint:#4a4845;
            --accent:#c9a96e;--accent-hover:#dfc085;
            --accent-dim:oklch(0.72 0.08 60/.15);
            --shadow-card:0 2px 8px oklch(0 0 0/.35),0 0 0 1px oklch(0.85 0 0/.06);
            --shadow-hover:0 8px 28px oklch(0 0 0/.5),0 0 0 1px oklch(0.85 0 0/.1);
        }
        [data-theme="light"]{
            --bg:#f7f5f0;--surface:#ffffff;--surface-2:#f3f1ec;--surface-3:#ebe8e2;
            --border:oklch(0.2 0 0/.1);--border-hover:oklch(0.2 0 0/.22);
            --text:#1c1a17;--text-muted:#6b6560;--text-faint:#b0aca5;
            --accent:#9c6f2e;--accent-hover:#7d580f;
            --accent-dim:oklch(0.55 0.1 60/.1);
            --shadow-card:0 2px 8px oklch(0.2 0 0/.08),0 0 0 1px oklch(0.2 0 0/.06);
            --shadow-hover:0 8px 28px oklch(0.2 0 0/.14),0 0 0 1px oklch(0.2 0 0/.1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
        body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
             color:var(--text);background:var(--bg);
             transition:background var(--transition),color var(--transition)}
        button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
        ::selection{background:var(--accent-dim);color:var(--text)}
        :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm)}
        a{text-decoration:none;color:inherit}
        .page{max-width:720px;margin:0 auto;padding:var(--space-8) var(--space-4) var(--space-16)}
        .topbar{display:flex;justify-content:flex-end;margin-bottom:var(--space-6)}
        .theme-toggle{width:40px;height:40px;border-radius:var(--radius-full);
            background:var(--surface-2);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;color:var(--text-muted);
            transition:all var(--transition)}
        .theme-toggle:hover{color:var(--text);background:var(--surface-3)}
        .theme-toggle svg{width:16px;height:16px}
        header{display:flex;flex-direction:column;align-items:center;text-align:center;
               padding:var(--space-4) 0 var(--space-10);gap:var(--space-5)}
        .profile-ring{position:relative;width:96px;height:96px}
        .profile-ring::before{content:'';position:absolute;inset:-3px;border-radius:50%;
            background:conic-gradient(var(--accent) 0deg,var(--accent-dim) 120deg,transparent 160deg,var(--accent) 360deg);
            animation:spin 8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .profile-img{position:relative;z-index:1;width:96px;height:96px;border-radius:50%;
                     object-fit:cover;border:3px solid var(--bg)}
        .brand-tag{display:inline-flex;align-items:center;gap:var(--space-2);
            background:var(--accent-dim);border:1px solid oklch(from var(--accent) l c h/.3);
            color:var(--accent);font-size:var(--text-xs);font-weight:600;
            letter-spacing:.08em;text-transform:uppercase;
            padding:var(--space-1) var(--space-3);border-radius:var(--radius-full)}
        .brand-tag::before{content:'';width:6px;height:6px;border-radius:50%;
            background:var(--accent);animation:pulse 2s ease infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
        h1{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:400;
           font-style:italic;letter-spacing:-.02em;line-height:1.1}
        .bio{font-size:var(--text-sm);color:var(--text-muted);max-width:36ch;line-height:1.6}
        .section-label{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5)}
        .section-label span{font-size:var(--text-xs);font-weight:600;letter-spacing:.1em;
            text-transform:uppercase;color:var(--text-faint)}
        .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
        .brands-grid{display:flex;flex-direction:column;gap:var(--space-4);margin-bottom:var(--space-8)}
        .brand-pair{background:var(--surface);border:1px solid var(--border);
            border-radius:var(--radius-xl);overflow:hidden;
            transition:border-color var(--transition),box-shadow var(--transition);
            box-shadow:var(--shadow-card)}
        .brand-pair:hover{border-color:var(--border-hover);box-shadow:var(--shadow-hover)}
        .brand-header{display:grid;grid-template-columns:80px 1fr;align-items:center;
                      border-bottom:1px solid var(--border)}
        .brand-thumb{width:80px;height:80px;object-fit:cover;flex-shrink:0}
        .brand-meta{padding:var(--space-4) var(--space-5)}
        .brand-name{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;
                    color:var(--text);line-height:1.2}
        .brand-category{font-size:var(--text-xs);color:var(--text-faint);margin-top:var(--space-1);
                        text-transform:uppercase;letter-spacing:.06em}
        .brand-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
        .action-btn{display:flex;align-items:center;justify-content:center;gap:var(--space-2);
            padding:var(--space-3) var(--space-2);font-size:var(--text-sm);font-weight:500;
            color:var(--text-muted);transition:all var(--transition);text-align:center;}
        .action-btn:not(:last-child){border-right:1px solid var(--border);}
        .action-btn:hover{background:var(--surface-2);color:var(--text)}
        .action-btn.primary:hover{background:var(--accent-dim);color:var(--accent)}
        .action-btn i{font-size:.9em}
        .action-btn .btn-label{font-size:var(--text-xs);font-weight:500}
        @media(max-width:520px){
            .brand-actions{grid-template-columns:1fr;}
            .action-btn:not(:last-child){border-right:none;border-bottom:1px solid var(--border);}
        }
        footer{text-align:center;padding-top:var(--space-8)}
        .footer-logo{font-family:var(--font-display);font-style:italic;font-size:var(--text-base);color:var(--text-faint);margin-bottom:var(--space-2)}
        .footer-divider{width:32px;height:1px;background:var(--border);margin:var(--space-3) auto}
        .admin-panel{display:none;background:var(--surface);border:1px solid var(--border);
            border-radius:var(--radius-xl);padding:var(--space-6);margin-bottom:var(--space-8);
            box-shadow:var(--shadow-card)}
        .admin-panel.visible{display:block}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-3)}
        @media(max-width:500px){.form-row{grid-template-columns:1fr}}
        input[type="text"],input[type="url"]{padding:var(--space-3) var(--space-4);
            background:var(--surface-2);border:1px solid var(--border);
            border-radius:var(--radius-md);font-size:var(--text-sm);width:100%;}
        .btn{padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);
             font-size:var(--text-sm);font-weight:600;transition:all var(--transition);
             border:1px solid transparent}
        .btn-primary{background:var(--accent);color:#0e0d0c}
        .btn-primary:hover{background:var(--accent-hover)}
        .btn-ghost{background:transparent;border-color:var(--border);color:var(--text-muted)}
        #toggle-admin-btn{position:fixed;bottom:0;left:0;width:100%;height:12px;background:transparent;cursor:default}

        /* MODAL APPS SECTION */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);
            display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;
            transition:all var(--transition);}
        .modal-overlay.active{opacity:1;visibility:visible;}
        .modal-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);
            max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-hover);
            transform:scale(0.96);transition:transform var(--transition);}
        .modal-overlay.active .modal-container{transform:scale(1);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:var(--space-5) var(--space-6);
            border-bottom:1px solid var(--border);}
        .modal-header h3{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-0.01em;}
        .modal-close{width:32px;height:32px;border-radius:var(--radius-full);background:var(--surface-2);
            display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all var(--transition);}
        .modal-close:hover{background:var(--surface-3);color:var(--text);}
        .modal-body{padding:var(--space-6);}
        .app-category{margin-bottom:var(--space-6);}
        .app-category:last-child{margin-bottom:0;}
        .app-category h4{font-size:var(--text-base);font-weight:600;display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3);color:var(--accent);}
        .app-category h4 i{font-size:1.2em;}
        .app-links-list{display:flex;flex-direction:column;gap:var(--space-2);}
        .app-link-item{background:var(--surface-2);border-radius:var(--radius-md);padding:var(--space-2) var(--space-4);
            transition:background var(--transition);}
        .app-link-item a{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);font-size:var(--text-sm);}
        .app-link-item .branch{font-weight:500;color:var(--text);}
        .app-link-item .url-trunc{font-size:var(--text-xs);color:var(--text-muted);font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .app-link-item:hover{background:var(--surface-3);}
        .empty-message{color:var(--text-faint);font-size:var(--text-sm);font-style:italic;padding:var(--space-2) 0;}
        hr{margin:var(--space-4) 0;border-color:var(--border);}
        @keyframes reveal-fade{to{opacity:1}}
    </style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <button class="theme-toggle" data-theme-toggle aria-label="Cambiar tema">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>

    <header>
        <div class="profile-ring">
            <img src="https://i.postimg.cc/zvtDYFCR/Photoroom-20251211-235942.jpg"
                 alt="AMG Hospitality Group" class="profile-img" width="96" height="96">
        </div>
        <div class="brand-tag">AMG Hospitality Group</div>
        <h1>Menús AMG</h1>
        <p class="bio">Creadores de algunas de las marcas más chingonas de México.</p>
    </header>

    <div class="admin-panel" id="admin-panel">
        <div class="admin-title"><i class="fas fa-sliders"></i> Agregar Enlace</div>
        <div class="form-row">
            <div class="form-group">
                <label for="link-title">Título</label>
                <input type="text" id="link-title" placeholder="Nombre de la marca">
            </div>
            <div class="form-group">
                <label for="link-url">URL del menú</label>
                <input type="url" id="link-url" placeholder="https://...">
            </div>
        </div>
        <div class="admin-actions">
            <button class="btn btn-primary" id="add-link-btn"><i class="fas fa-plus"></i> Agregar</button>
            <button class="btn btn-ghost" id="reset-links-btn"><i class="fas fa-redo"></i> Reiniciar</button>
        </div>
    </div>

    <div class="section-label"><span>Nuestras marcas</span></div>
    <div class="brands-grid" id="brands-container"></div>

    <footer>
        <div class="footer-logo">AMG</div>
        <div class="footer-divider"></div>
        <div class="footer-sub">Hospitality Group &middot; México</div>
    </footer>
</div>
<button id="toggle-admin-btn" aria-label="Panel admin"></button>

<!-- MODAL para Apps (Rappi / Uber / Didi) -->
<div id="deliveryModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalBrandTitle">Delivery Apps</h3>
            <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modalBodyContent">
            <!-- dinámico -->
        </div>
    </div>
</div>

            {name:"Palermo",category:"Empanadas · Argentino", menuUrl:"https://order.foodbot.ai/palermo/", instaUrl:"https://www.instagram.com/palermoempanadasmx?igsh=MWFnMXdpNnRkY3lwdA==", thumb:"https://i.postimg.cc/Z54DpzpQ/IMG-4339.jpg", handle:"@palermoempanadasmx"}
        ];

        let brands = JSON.parse(JSON.stringify(DEFAULT));
        const container = document.getElementById('brands-container');

        function render(){
            container.innerHTML = '';
            brands.forEach(b => {
                const card = document.createElement('div');
                card.className = 'brand-pair';
                const thumbHtml = b.thumb ? `<img src="${b.thumb}" alt="${b.name}" class="brand-thumb" width="80" height="80" loading="lazy">` : `<div class="brand-thumb" style="background:var(--surface-3);display:flex;align-items:center;justify-content:center;"><i class="fas fa-utensils"></i></div>`;
                card.innerHTML = `
                    <div class="brand-header">
                        ${thumbHtml}
                        <div class="brand-meta">
                            <div class="brand-name">${b.name}</div>
                            <div class="brand-category">${b.category || ''}</div>
                        </div>
                    </div>
                    <div class="brand-actions">
                        <a href="${b.menuUrl}" target="_blank" rel="noopener noreferrer" class="action-btn primary"><i class="fas fa-utensils"></i><span class="btn-label">Ver menú</span></a>
                        <a href="${b.instaUrl||b.menuUrl}" target="_blank" rel="noopener noreferrer" class="action-btn"><i class="fab fa-instagram"></i><span class="btn-label">${b.handle||'Instagram'}</span></a>
                        <button class="action-btn apps-btn" data-brand="${b.name}"><i class="fas fa-mobile-alt"></i><span class="btn-label">Delivery Apps</span></button>
                    </div>
                `;
                container.appendChild(card);
            });
            // attach event listeners to all apps buttons
            document.querySelectorAll('.apps-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const brandName = btn.getAttribute('data-brand');
                    openDeliveryModal(brandName);
                });
            });
        }

        // modal logic
        const modal = document.getElementById('deliveryModal');
        const modalTitle = document.getElementById('modalBrandTitle');
        const modalBody = document.getElementById('modalBodyContent');
        const closeModal = document.getElementById('closeModalBtn');

        function openDeliveryModal(brandName){
            const data = deliveryData[brandName] || { rappi: [], uber: [] };
            const rappiList = data.rappi || [];
            const uberList = data.uber || [];
            const hasDidi = false; // no hay Didi en el archivo proporcionado

            modalTitle.innerText = `${brandName} · Apps de Delivery`;
            let html = '';

            // Rappi section
            html += `<div class="app-category"><h4><i class="fab fa-rapp"></i> Rappi</h4><div class="app-links-list">`;
            if(rappiList.length === 0){
                html += `<div class="empty-message"><i class="fas fa-info-circle"></i> No disponible en Rappi</div>`;
            } else {
                rappiList.forEach(item => {
                    html += `<div class="app-link-item"><a href="${item.url}" target="_blank" rel="noopener"><span class="branch"><i class="fas fa-location-dot"></i> ${item.branch}</span><span class="url-trunc">ir a Rappi →</span></a></div>`;
                });
            }
            html += `</div></div>`;

            // Uber Eats section
            html += `<div class="app-category"><h4><i class="fab fa-uber"></i> Uber Eats</h4><div class="app-links-list">`;
            if(uberList.length === 0){
                html += `<div class="empty-message"><i class="fas fa-info-circle"></i> No disponible en Uber Eats</div>`;
            } else {
                uberList.forEach(item => {
                    html += `<div class="app-link-item"><a href="${item.url}" target="_blank" rel="noopener"><span class="branch"><i class="fas fa-location-dot"></i> ${item.branch}</span><span class="url-trunc">pedir en Uber →</span></a></div>`;
                });
            }
            html += `</div></div>`;

            // Didi (sin datos del archivo)
            html += `<div class="app-category"><h4><i class="fas fa-car"></i> Didi Food</h4><div class="empty-message"><i class="fas fa-ban"></i> No hay enlaces de Didi disponibles en el archivo.</div></div>`;

            modalBody.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModalFunc(){
            modal.classList.remove('active');
        }
        closeModal.addEventListener('click', closeModalFunc);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
        // cierre con escape
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modal.classList.contains('active')) closeModalFunc(); });

        // admin panel legacy
        const adminPanel=document.getElementById('admin-panel');
        document.getElementById('toggle-admin-btn').addEventListener('click',e=>{
            e.stopPropagation();
            adminPanel.classList.toggle('visible');
        });
        document.getElementById('add-link-btn').addEventListener('click',()=>{
            const name=document.getElementById('link-title').value.trim();
            const url=document.getElementById('link-url').value.trim();
            if(!name||!url){alert('Completa título y URL');return}
            try{new URL(url)}catch{alert('URL no válida');return}
            brands.push({name,category:'',menuUrl:url,instaUrl:url,thumb:'',handle:''});
            render();
            document.getElementById('link-title').value='';
            document.getElementById('link-url').value='';
        });
        document.getElementById('reset-links-btn').addEventListener('click',()=>{
            if(confirm('¿Restaurar marcas originales?')){
                brands=JSON.parse(JSON.stringify(DEFAULT));
                render();
            }
        });
        render();
    })();
</script>
</body>
</html>
